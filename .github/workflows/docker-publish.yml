name: Build and publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    outputs:
      short-sha: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read short git sha
        id: version
        run: |
          echo "version=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Read version from package.json
        id: pkg
        run: |
          echo "version=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.pkg.outputs.version }}
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            BUILD_AUTH_URL=${{ secrets.BUILD_AUTH_URL || vars.BUILD_AUTH_URL }}
            BUILD_API_URL=${{ secrets.BUILD_API_URL || vars.BUILD_API_URL }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: docker
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    env:
      PORTAINER_UI_SERVICE_WEBHOOK_URL: ${{ secrets.PORTAINER_UI_SERVICE_WEBHOOK_URL }}
    steps:
      - name: Deploy to Portainer via Webhook
        run: |
          echo "Deploying image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.docker.outputs.short-sha }}"

          trigger_portainer_webhook() {
            local name="$1"
            local url="$2"

            if [ -z "$url" ]; then
              echo "ℹ️  Skipping $name webhook because URL is empty"
              return 0
            fi

            echo "➡️  Triggering $name webhook"

            local response
            local curl_exit
            local http_status
            local response_body

            set +e
            response=$(curl -sS -L -X POST "$url" \
              -H "Content-Type: application/json" \
              --data '{}' \
              --connect-timeout 10 \
              --max-time 30 \
              --retry 2 \
              --retry-delay 2 \
              -w "HTTPSTATUS:%{http_code}")
            curl_exit=$?
            set -e

            if [ "$curl_exit" -eq 60 ]; then
              echo "⚠️  TLS verification failed for $name webhook. Retrying with --insecure."
              set +e
              response=$(curl -sS -L -X POST "$url" \
                -H "Content-Type: application/json" \
                --data '{}' \
                --connect-timeout 10 \
                --max-time 30 \
                --retry 2 \
                --retry-delay 2 \
                --insecure \
                -w "HTTPSTATUS:%{http_code}")
              curl_exit=$?
              set -e
            fi

            if [ "$curl_exit" -ne 0 ]; then
              echo "❌ $name webhook request failed before HTTP response (curl exit: $curl_exit)"
              exit 1
            fi

            http_status=$(printf '%s' "$response" | sed -e 's/.*HTTPSTATUS://')
            response_body=$(printf '%s' "$response" | sed -e 's/HTTPSTATUS:.*//')

            if [ "$http_status" -ne 200 ] && [ "$http_status" -ne 202 ] && [ "$http_status" -ne 204 ]; then
              echo "❌ $name webhook failed with HTTP status: $http_status"
              if [ -n "$response_body" ]; then
                echo "Response body:"
                echo "$response_body"
              fi
              exit 1
            fi

            echo "✅ $name webhook triggered successfully (HTTP $http_status)"
          }

          trigger_portainer_webhook "Service deployment" "${PORTAINER_UI_SERVICE_WEBHOOK_URL:-}"
